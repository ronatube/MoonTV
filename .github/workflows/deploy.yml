# MoonTV → Cloudflare Workers 自动部署
# 每次 push 到 main 分支时触发
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  # 也可以手动触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 并发控制：同一分支只跑一个部署，新的会取消旧的
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Build (OpenNext Cloudflare)
        run: npx opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_ACCOUNT_TOKEN }}
          # 注入环境变量（值从 GitHub Secrets 读取，不在仓库里明文存放）
          vars: |
            USERNAME: ${{ secrets.MOONTV_USERNAME }}
            PASSWORD: ${{ secrets.MOONTV_PASSWORD }}
