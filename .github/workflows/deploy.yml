# MoonTV → Cloudflare Workers 自动部署
# 每次 push 到 main 分支时触发
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  # 也可以手动触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 并发控制：同一分支只跑一个部署，新的会取消旧的
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # 版本号自动从 package.json 的 packageManager 字段读取

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Build (OpenNext Cloudflare)
        run: npx opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion

      - name: Deploy to Cloudflare Workers
        run: |
          pnpm dlx wrangler@4 deploy --dry-run 2>&1 | head -20 || true
          echo "=== Real deploy ==="
          pnpm dlx wrangler@4 deploy \
            --var USERNAME:${{ secrets.MOONTV_USERNAME }} \
            --var PASSWORD:${{ secrets.MOONTV_PASSWORD }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_ACCOUNT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "4a50ebd27b5f627e14ec98fff3680762"
          WRANGLER_API_ENVIRONMENT: production
